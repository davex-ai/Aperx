server:
  port: 8080

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_ADDRESS}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  application:
    name: hrms-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-development-only-secret-please-override-in-production-env}
    expiration-ms: 86400000

  cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}


  mail:
    from: ${MAIL_FROM:hr-noreply@company.com}

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  storage:
    documents-dir: ${DOCUMENTS_DIR:./storage/documents}

logging:
  level:
    com.hrms: INFO
    org.springframework.security: WARN
