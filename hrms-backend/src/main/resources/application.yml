server:
  port: 8080

spring:
  application:
    name: hrms-backend
  datasource:
    url: jdbc:postgresql://aws-0-eu-west-3.pooler.supabase.com:5432/postgres
    username: ${DB_USERNAME:postgres.aortmmbwsmvejwpgjtre}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
brevo:
  api-key: ${BREVO_API_KEY}
  sender-email: ${BREVO_SENDER_EMAIL}
  sender-name: ${BREVO_SENDER_NAME:AperX}

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-development-only-secret-please-override-in-production-env}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://aperx.vercel.app}

  mail:
    from: ${MAIL_FROM:hr-noreply@company.com}

  frontend-url: ${FRONTEND_URL:https://aperx.vercel.app}

  storage:
    documents-dir: ${DOCUMENTS_DIR:./storage/documents}

logging:
  level:
    com.hrms: INFO
    org.springframework.security: WARN
