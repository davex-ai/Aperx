server:
  port: 8080

spring:
  application:
    name: hrms-backend

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_ADDRESS:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

brevo:
  api-key: ${BREVO_API_KEY}
  sender-email: ${BREVO_SENDER_EMAIL}
  sender-name: ${BREVO_SENDER_NAME:AperX}

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-development-only-secret-please-override-in-production-env}
    expiration-ms: 86400000

  cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}


  mail:
    from: ${MAIL_FROM:hr-noreply@company.com}

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  storage:
    documents-dir: ${DOCUMENTS_DIR:./storage/documents}

logging:
  level:
    com.hrms: INFO
    org.springframework.security: WARN
