server:
  port: 8080

spring:
  application:
    name: hrms-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/hrms_db
    username: ${DB_USERNAME:hrms_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-development-only-secret-please-override-in-production-env}
    expiration-ms: 86400000

  resend:
    api-key: ${RESEND_API_KEY:}

  mail:
    from: ${MAIL_FROM:hr-noreply@company.com}

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  storage:
    documents-dir: ${DOCUMENTS_DIR:./storage/documents}

logging:
  level:
    com.hrms: INFO
    org.springframework.security: WARN
